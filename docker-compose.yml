services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      POSTGRES_DB: auth_gateway
      POSTGRES_USER: auth_gateway
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth_gateway -d auth_gateway"]
      interval: 10s
      timeout: 5s
      retries: 5

  auth-gateway:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env.production
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/auth_gateway
      DATABASE_USERNAME: auth_gateway
      AUTH_GATEWAY_JWT_PRIVATE_KEY_PATH: /run/secrets/auth-gateway-private-key.pem
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ./secrets/auth-gateway-private-key.pem:/run/secrets/auth-gateway-private-key.pem:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
