<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Platform Registry</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
<main class="shell admin-shell">
    <section class="hero admin-hero">
        <div>
            <p class="eyebrow">Auth Gateway Admin</p>
            <h1>Platform Registry</h1>
            <p class="muted">Manage downstream platforms that can use this gateway as an OIDC identity provider.</p>
        </div>
        <div class="user-card">
            <a class="text-link" href="/admin">Dashboard</a>
            <a class="text-link" href="/admin/services">Service Inventory</a>
        </div>
    </section>

    <section class="admin-grid">
        <form class="admin-form" th:action="${editingId == '' ? '/admin/platforms' : '/admin/platforms/' + editingId}" th:object="${form}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <h2 th:text="${editingId == '' ? 'New Platform' : 'Edit Platform'}">New Platform</h2>
            <p class="form-error" th:if="${error != ''}" th:text="${error}">Form error</p>

            <label>
                <span>Client ID</span>
                <input th:field="*{clientId}" th:readonly="${editingId != ''}" placeholder="job-crm">
            </label>
            <label>
                <span>Name</span>
                <input th:field="*{name}" placeholder="Job CRM">
            </label>
            <label>
                <span>Description</span>
                <input th:field="*{description}" placeholder="Application pipeline">
            </label>
            <label>
                <span>Launch URL</span>
                <input th:field="*{homeUrl}" placeholder="https://tools.liangwendev.com/job/api/auth/login">
            </label>
            <label>
                <span>Client Secret</span>
                <input th:field="*{clientSecret}">
            </label>
            <label>
                <span>Redirect URIs</span>
                <textarea th:field="*{redirectUrisText}" rows="3"></textarea>
            </label>
            <label>
                <span>Logout Redirect URIs</span>
                <textarea th:field="*{postLogoutRedirectUrisText}" rows="3"></textarea>
            </label>
            <label class="check-row">
                <input type="checkbox" th:field="*{enabled}">
                <span>Enabled</span>
            </label>

            <div class="form-actions">
                <button type="submit">Save</button>
                <a class="text-link" href="/admin/platforms" th:if="${editingId != ''}">Cancel</a>
            </div>
        </form>

        <section class="admin-table-wrap">
            <table class="admin-table">
                <thead>
                <tr>
                    <th>Platform</th>
                    <th>Status</th>
                    <th>Client ID</th>
                    <th>Launch URL</th>
                    <th>Redirects</th>
                    <th></th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="platform : ${platforms}">
                    <td>
                        <strong th:text="${platform.name()}">Job CRM</strong>
                        <small th:text="${platform.description()}">description</small>
                    </td>
                    <td><span class="pill strong" th:text="${platform.enabled() ? 'ENABLED' : 'DISABLED'}">ENABLED</span></td>
                    <td th:text="${platform.clientId()}">job-crm</td>
                    <td><a th:href="${platform.homeUrl()}" th:text="${platform.homeUrl()}">url</a></td>
                    <td>
                        <ul>
                            <li th:each="uri : ${platform.redirectUris()}" th:text="${uri}">redirect</li>
                        </ul>
                    </td>
                    <td><a class="text-link" th:href="@{/admin/platforms/{id}/edit(id=${platform.id()})}">Edit</a></td>
                </tr>
                </tbody>
            </table>
        </section>
    </section>
</main>
</body>
</html>
