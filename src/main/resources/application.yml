spring:
  application:
    name: auth-gateway
  datasource:
    url: ${DATABASE_URL:jdbc:h2:file:./data/auth-gateway;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE}
    username: ${DATABASE_USERNAME:sa}
    password: ${DATABASE_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    open-in-view: false
  h2:
    console:
      enabled: ${H2_CONSOLE_ENABLED:false}
      path: /h2-console
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:dev-google-client-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:dev-google-client-secret}
            scope:
              - openid
              - profile
              - email

server:
  port: ${PORT:8080}
  forward-headers-strategy: framework
  servlet:
    session:
      cookie:
        name: AUTH_GATEWAY_SESSION
        http-only: true
        same-site: lax
        secure: ${SESSION_COOKIE_SECURE:false}

identity:
  issuer: ${AUTH_GATEWAY_ISSUER:http://localhost:8080}
  access:
    allowed-emails: ${ALLOWED_EMAILS:}
    allowed-domains: ${ALLOWED_DOMAINS:}
    require-verified-email: ${REQUIRE_VERIFIED_EMAIL:true}
  signing-key:
    private-key-location: ${AUTH_GATEWAY_JWT_PRIVATE_KEY_PATH:}
    private-key: ${AUTH_GATEWAY_JWT_PRIVATE_KEY:}
    key-id: ${AUTH_GATEWAY_JWT_KEY_ID:}
  apps:
    - id: job-crm-local
      name: Job CRM
      description: Application pipeline and interview intelligence
      url: ${JOB_CRM_URL:http://localhost:3000/job/}
      enabled: true
    - id: interview-local
      name: Interview Intelligence
      description: Recording review and interview practice
      url: ${INTERVIEW_URL:http://localhost:3000/}
      enabled: true
  clients:
    - client-id: job-crm-local
      client-secret: ${JOB_CRM_CLIENT_SECRET:dev-job-crm-secret}
      redirect-uris:
        - ${JOB_CRM_REDIRECT_URI:http://localhost:3000/login/oauth2/code/auth-gateway}
      post-logout-redirect-uris:
        - ${JOB_CRM_LOGOUT_REDIRECT_URI:http://localhost:3000/job/}
    - client-id: interview-local
      client-secret: ${INTERVIEW_CLIENT_SECRET:dev-interview-secret}
      redirect-uris:
        - ${INTERVIEW_REDIRECT_URI:http://localhost:3000/login/oauth2/code/auth-gateway}
      post-logout-redirect-uris:
        - ${INTERVIEW_LOGOUT_REDIRECT_URI:http://localhost:3000/}

management:
  endpoints:
    web:
      exposure:
        include: health,info
